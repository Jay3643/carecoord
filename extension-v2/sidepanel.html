<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seniority Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f4f7f8; display: flex; flex-direction: column; }

    /* Top bar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: #143d6b; color: #fff; flex-shrink: 0;
      border-bottom: 1px solid #102f54; min-height: 36px;
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .topbar-logo { width: 22px; height: 22px; border-radius: 4px; object-fit: contain; }
    .topbar-title { font-size: 13px; font-weight: 600; letter-spacing: 0.3px; }
    .topbar-btn {
      background: none; border: 1px solid #1a5e9a; color: #a8c8e8;
      border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .topbar-btn:hover { background: #1a5e9a; color: #fff; }

    /* Main iframe */
    .frame-container { flex: 1; overflow: hidden; position: relative; }
    iframe {
      width: 100%; height: 100%; border: none; background: #f4f7f8;
    }

    /* Loading state */
    .loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #f4f7f8;
      color: #6b8299; gap: 12px; z-index: 10;
    }
    .loading.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #dde8f2;
      border-top-color: #1a5e9a; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Offline banner */
    .offline-banner {
      display: none; padding: 8px 12px; background: #fef3c7;
      color: #92400e; font-size: 12px; text-align: center;
      border-bottom: 1px solid #fde68a;
    }
    .offline-banner.show { display: block; }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="icons/icon48.png" alt="" class="topbar-logo">
      <span class="topbar-title">Seniority Connect</span>
    </div>
    <div style="display: flex; gap: 6px;">
      <button class="topbar-btn" id="btn-refresh" title="Refresh">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      </button>
      <button class="topbar-btn" id="btn-popout" title="Open in new window">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
      <button class="topbar-btn" id="btn-logout" title="Log out">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Offline banner -->
  <div class="offline-banner" id="offline-banner">
    You appear to be offline. Seniority Connect requires an internet connection.
  </div>

  <!-- Main content -->
  <div class="frame-container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span style="font-size: 13px;">Loading Seniority Connect...</span>
    </div>
    <iframe id="app-frame" src="" allow="clipboard-write"></iframe>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
