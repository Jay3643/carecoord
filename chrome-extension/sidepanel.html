<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seniority Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 14px; color: #1e3a4f; background: #f4f7f8; height: 100vh; display: flex; flex-direction: column; }

    .header { background: #143d6b; color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header img { width: 28px; height: 28px; border-radius: 4px; object-fit: contain; }
    .header-title { font-size: 15px; font-weight: 700; }
    .header-sub { font-size: 10px; opacity: 0.85; }

    .login-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 12px; }
    .login-screen input { width: 100%; padding: 10px 14px; border: 1px solid #c0d0e4; border-radius: 8px; font-size: 13px; outline: none; }
    .login-screen input:focus { border-color: #52a8c7; }

    .btn { padding: 8px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #52a8c7; color: #fff; }
    .btn-primary:hover { background: #3d8ba8; }
    .btn-secondary { background: #dde8f2; color: #5a7a8a; }
    .btn-small { padding: 4px 12px; font-size: 11px; border-radius: 6px; }

    .tabs { display: flex; border-bottom: 1px solid #dde8f2; background: #fff; flex-shrink: 0; }
    .tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: #6b8299; }
    .tab:hover { background: #f0f4f9; }
    .tab.active { color: #52a8c7; border-bottom-color: #52a8c7; }

    .content { flex: 1; overflow-y: auto; padding: 12px; }

    .card { background: #fff; border: 1px solid #dde8f2; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6b8299; margin-bottom: 8px; }

    .field { margin-bottom: 6px; }
    .field-label { font-size: 10px; font-weight: 600; color: #8a9fb0; text-transform: uppercase; }
    .field-value { font-size: 14px; color: #1e3a4f; }
    .field-value.empty { color: #c0d0e4; font-style: italic; }

    .ticket-row { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer; border: 1px solid #dde8f2; margin-bottom: 4px; }
    .ticket-row:hover { background: #f0f4f9; }
    .ticket-id { font-size: 10px; font-family: monospace; color: #6b8299; }
    .ticket-subject { font-size: 12px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    .status-open { background: #dbeafe; color: #1e40af; }
    .status-waiting { background: #fef3c7; color: #8a6d2e; }
    .status-closed { background: #d1d5db; color: #374151; }

    .ai-chat { flex: 1; display: flex; flex-direction: column; }
    .ai-messages { flex: 1; overflow-y: auto; padding: 8px 0; }
    .ai-msg { display: flex; gap: 8px; padding: 6px 0; align-items: flex-start; }
    .ai-avatar { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; }
    .ai-avatar.user { background: #1a5e9a; }
    .ai-avatar.bot img { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
    .ai-name { font-size: 10px; font-weight: 700; margin-bottom: 2px; }
    .ai-text { font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .ai-input-row { display: flex; gap: 6px; padding: 8px 0; border-top: 1px solid #dde8f2; }
    .ai-input-row input { flex: 1; padding: 8px 12px; border: 1px solid #dde8f2; border-radius: 20px; font-size: 12px; outline: none; }
    .ai-input-row input:focus { border-color: #52a8c7; }

    .loading { text-align: center; color: #8a9fb0; font-style: italic; padding: 20px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .thinking img { animation: pulse 1.5s ease-in-out infinite; }

    .action-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }

    .toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 8px 20px; border-radius: 8px; font-size: 12px; z-index: 100; }

    .server-url { display: flex; gap: 4px; margin-bottom: 8px; }
    .server-url input { flex: 1; padding: 6px 10px; border: 1px solid #c0d0e4; border-radius: 6px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon128.jpg" alt="Logo">
    <div>
      <div class="header-title">Seniority Connect</div>
      <div class="header-sub" id="status-text">Not connected</div>
    </div>
  </div>

  <div id="app"></div>
  <div id="toast" class="toast" style="display:none"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
